info:
  name: update task progress
  type: http
  seq: 21

http:
  method: PATCH
  url: "{{baseUrl}}tasks/progress"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{token}}"
  body:
    type: json
    data: |-
      {
                 "TaskID": 1,
                 "TaskProgress": 75
               }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
