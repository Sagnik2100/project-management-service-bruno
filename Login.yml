info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}auth/login"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{token}}"
  body:
    type: json
    data: '{"username":"lead","password":"admin@123"}'
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        function onResponse(res) {
          let data = res.getBody();
          bru.setEnvVar("token", data.data.token);
        }

        onResponse(res);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
