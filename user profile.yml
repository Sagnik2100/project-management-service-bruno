info:
  name: user profile
  type: http
  seq: 8

http:
  method: PUT
  url: "{{baseUrl}}users/profile"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{token}}"
  body:
    type: json
    data: |-
      {
                 "email": "user@example.com",
                 "fullName": "John Doe",
                 "contactNumber": "1234567898",
                 "profilePicture": "base64_string_or_url",
                 "gitUsername": "johndoe_git",
                 "gitPublicKey": "ssh-rsa ...",
                 "designations": [1, 2, 3]
               }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
