info:
  name: task
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}api/tasks"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{token}}"
  body:
    type: json
    data: |-
      {
                 "TaskID": 0,
                 "TaskStatus": 1,
                 "TaskTypeID": 2,
                 "ProjectID": 2,
                 "Priority": 1,
                 "Title": "Fix login bug",
                 "SubTitle": "Auth module",
                 "TaskDescription": "Investigate and fix the login failure",
                 "ProgressPercentage": 10,
                 "Deadline": "2026-03-31",
                 "AssignedToUserID": 5
               }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
