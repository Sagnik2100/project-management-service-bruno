info:
  name: get notification
  type: http
  seq: 30

http:
  method: get
  url: "{{baseUrl}}notifications"
  headers:
    - name: Authorization
      value: "{{token}}"
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
