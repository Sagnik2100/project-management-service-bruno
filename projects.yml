info:
  name: Projects
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}projects"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{token}}"
  body:
    type: json
    data: |-
      {
                 "ProjectID": 0,
                 "ProjectName": "New Project with Deadline",
                 "ProjectDeadline": "2026-12-31",
                 "ProgressPercentage": 15,
                 "ProjectType": 1,
                 "ProjectPriority": 1,
                 "ProjectStatus": 1
               }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
