info:
  name: update task status
  type: http
  seq: 10

http:
  method: PATCH
  url: "{{vercel}}tasks/status"
  headers:
    - name: Authorization
      value: "{{token}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
         "TaskID": 1,
          "TaskStatus": 2,
          "IsRejected": 1,
          "Remarks": "Insufficient details provided",
          "TaskPriority": 1,
          "TaskDeadline": "2026-03-20T17:00:00"
        }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
