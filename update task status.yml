info:
  name: update task status
  type: http
  seq: 10

http:
  method: PATCH
  url: "{{baseUrl}}tasks/status"
  headers:
    - name: Authorization
      value: "{{token}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "TaskID": 1,
          "TaskStatus": 2,
          "TaskPriority": 1,
          "TaskDeadline": "2026-12-31 23:59:59"
        }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
