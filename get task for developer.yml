http:
  method: GET
  url: "{{baseUrl}}tasks/my-tasks?projectId=0&taskStatusId=0&taskPriority=0"
  headers:
    - name: Authorization
      value: "{{token}}"
  params:
    - name: projectId
      value: "0"
      type: query
    - name: taskStatusId
      value: "0"
      type: query
    - name: taskPriority
      value: "0"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
