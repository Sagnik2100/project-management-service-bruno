info:
  name: available dev for assignment
  type: http
  seq: 20

http:
  method: GET
  url: "{{baseUrl}}tasks/available-developers?projectId=1"
  headers:
    - name: Authorization
      value: "{{token}}"
  params:
    - name: projectId
      value: "1"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
